name: Agent Watchdog

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:  # manual trigger

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check and restart dead agents
        env:
          ORB_KEY: ${{ secrets.ORB_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -e
          ORB_API="https://api.orbcloud.dev/v1"

          echo "=== Checking all agents ==="
          COMPUTERS=$(curl -sS "$ORB_API/computers" -H "Authorization: Bearer $ORB_KEY")

          echo "$COMPUTERS" | python3 -c "
          import json, sys, urllib.request, os, time

          data = json.load(sys.stdin)
          API = '$ORB_API'
          KEY = os.environ['ORB_KEY']
          GLM = os.environ['GLM_API_KEY']
          GH = os.environ['GITHUB_TOKEN']

          computers = data.get('computers', [])
          print(f'Total computers: {len(computers)}')

          restarted = 0
          healthy = 0

          for c in computers:
              cid = c['id']
              name = c['name']

              # Get agent state
              req = urllib.request.Request(f'{API}/computers/{cid}/agents', headers={'Authorization': f'Bearer {KEY}'})
              with urllib.request.urlopen(req, timeout=10) as r:
                  agents = json.loads(r.read().decode()).get('agents', [])

              alive = [a for a in agents if a.get('state') not in ('failed',)]

              if len(alive) == 0:
                  print(f'  {name}: DEAD - restarting...')
                  # Start fresh agent
                  body = json.dumps({
                      'task': 'start',
                      'replace': True,
                      'org_secrets': {
                          'GLM_API_KEY': GLM,
                          'GITHUB_TOKEN': GH,
                          'ORB_COMPUTER_ID': cid,
                      },
                  }).encode()
                  req = urllib.request.Request(
                      f'{API}/computers/{cid}/agents',
                      data=body,
                      headers={'Authorization': f'Bearer {KEY}', 'Content-Type': 'application/json'},
                      method='POST'
                  )
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          result = json.loads(r.read().decode())
                          print(f'    Deployed: {result.get(\"deployed\", 0)}')
                          restarted += 1
                  except Exception as e:
                      print(f'    FAILED: {e}')
              else:
                  state = alive[0].get('state', 'unknown')
                  print(f'  {name}: {state}')
                  healthy += 1

          print(f'')
          print(f'Healthy: {healthy} | Restarted: {restarted}')
          "
