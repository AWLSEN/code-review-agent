# Code Review Agent on Orb Cloud.
# Uses Claude Agent SDK (same as SPOQ-Food).
# Agents claim repos dynamically and review PRs continuously.

[agent]
name  = "code-review-agent"
lang  = "binary"
entry = "/bin/bash"
args  = ["/root/src/watchdog.sh"]

[agent.env]
HOME                 = "/root"
PATH                 = "/root/.npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
PYTHONUNBUFFERED     = "1"
IS_SANDBOX           = "1"
GITHUB_TOKEN         = "${GITHUB_TOKEN}"
ORB_COMPUTER_ID      = "${ORB_COMPUTER_ID}"
ANTHROPIC_BASE_URL   = "${ANTHROPIC_BASE_URL}"
ANTHROPIC_AUTH_TOKEN = "${ANTHROPIC_AUTH_TOKEN}"
API_TIMEOUT_MS       = "3000000"

[source]
git    = "https://github.com/AWLSEN/code-review-agent"
branch = "deploy"

[build]
working_dir = "/agent/code"
steps = [
  "apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates python3 python3-pip nodejs",
  "npm install -g @anthropic-ai/claude-code",
  "pip install --no-cache-dir --break-system-packages requests claude_agent_sdk",
  "mkdir -p /root/data/reviews /root/data/logs /root/data/repos",
  "cp -r /agent/code/src /root/src",
  "chmod +x /root/src/watchdog.sh",
]

[llm]
base_url = "https://api.z.ai/api/anthropic"

[resources]
runtime = "4GB"
disk    = "8GB"
